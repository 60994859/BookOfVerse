name: Deploy bilingual MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build bilingual MkDocs site
        shell: pwsh
        env:
          SITE_URL_EN: https://60994859.github.io/BookOfVerse/en/
          SITE_URL_ZH: https://60994859.github.io/BookOfVerse/zh/
          SITE_ALTERNATE_EN: /BookOfVerse/en/
          SITE_ALTERNATE_ZH: /BookOfVerse/zh/
        run: ./scripts/build_local_site.ps1 -Python python

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

